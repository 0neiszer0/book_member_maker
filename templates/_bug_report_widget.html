{% if session.user_role %}
<button type="button" id="wd-bug-report-open" class="wd-bug-report-open" aria-haspopup="dialog" aria-controls="wd-bug-report-dialog">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 3a5 5 0 0 1 5 5v1a4 4 0 0 1 3 4v1H4v-1a4 4 0 0 1 3-4V8a5 5 0 0 1 5-5Z"/><path d="M8 14v2a4 4 0 0 0 8 0v-2"/><path d="M3 19h4M17 19h4M4 9h3M17 9h3"/>
  </svg>
  <span>버그 제보</span>
</button>

<dialog id="wd-bug-report-dialog" class="wd-bug-report-dialog">
  <form id="wd-bug-report-form" method="dialog">
    <div class="wd-bug-report-head">
      <div>
        <div class="wd-bug-report-eyebrow">사용 중 불편한 점을 알려주세요</div>
        <h2>버그·개선 제보</h2>
      </div>
      <button type="button" id="wd-bug-report-close" class="wd-bug-report-close" aria-label="닫기">&times;</button>
    </div>
    <p class="wd-bug-report-copy">현재 화면 정보는 자동으로 함께 전달됩니다. 개인정보나 비밀번호는 적지 말아주세요.</p>
    <label class="wd-bug-report-label" for="wd-bug-category">제보 종류</label>
    <select id="wd-bug-category" class="wd-bug-report-field">
      <option value="bug">기능이 제대로 작동하지 않아요</option>
      <option value="suggestion">이렇게 개선되면 좋겠어요</option>
    </select>
    <label class="wd-bug-report-label" for="wd-bug-title">한 줄 요약</label>
    <input id="wd-bug-title" class="wd-bug-report-field" type="text" minlength="2" maxlength="120" placeholder="예: 저장 버튼을 눌러도 반응이 없어요" required>
    <label class="wd-bug-report-label" for="wd-bug-description">자세한 내용</label>
    <textarea id="wd-bug-description" class="wd-bug-report-field wd-bug-report-textarea" minlength="10" maxlength="3000" placeholder="어떤 화면에서 무엇을 했을 때 문제가 생겼는지 적어주세요." required></textarea>
    <div id="wd-bug-report-status" class="wd-bug-report-status" role="status" aria-live="polite"></div>
    <div class="wd-bug-report-actions">
      <button type="button" id="wd-bug-report-cancel" class="wd-bug-report-secondary">취소</button>
      <button type="submit" id="wd-bug-report-submit" class="wd-bug-report-primary">제보 보내기</button>
    </div>
  </form>
</dialog>

<style>
  .wd-bug-report-open{position:fixed;right:20px;bottom:20px;z-index:44;display:inline-flex;align-items:center;gap:7px;padding:10px 14px;border:1px solid #cdbb99;border-radius:999px;background:#fffdf8;color:#5b412a;font:700 13px/1 Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;box-shadow:0 8px 24px rgba(62,45,25,.16);cursor:pointer}
  .wd-bug-report-open:hover{background:#f2e8d8;color:#3d5c2e;transform:translateY(-1px)}
  .wd-bug-report-dialog{width:min(92vw,520px);padding:0;border:1px solid #dfcfaf;border-radius:20px;background:#fffdf8;color:#2a241b;box-shadow:0 28px 80px rgba(42,31,18,.28);font-family:Pretendard,-apple-system,BlinkMacSystemFont,sans-serif}
  .wd-bug-report-dialog::backdrop{background:rgba(36,29,20,.48);backdrop-filter:blur(3px)}
  .wd-bug-report-dialog form{padding:24px;margin:0}
  .wd-bug-report-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  .wd-bug-report-eyebrow{margin-bottom:5px;color:#7a5a3a;font-size:12px;font-weight:800;letter-spacing:.02em}
  .wd-bug-report-head h2{margin:0;color:#2a241b;font-size:24px;line-height:1.25;letter-spacing:-.035em}
  .wd-bug-report-close{width:34px;height:34px;border:0;border-radius:50%;background:#f2ebd8;color:#6b5d4a;font-size:25px;line-height:1;cursor:pointer}
  .wd-bug-report-copy{margin:14px 0 18px;color:#756a59;font-size:13px;line-height:1.55}
  .wd-bug-report-label{display:block;margin:12px 0 6px;color:#4a4034;font-size:13px;font-weight:750}
  .wd-bug-report-field{box-sizing:border-box;width:100%;padding:11px 12px;border:1px solid #d9c9aa;border-radius:10px;background:#fff;color:#2a241b;font:500 14px/1.45 inherit;outline:none}
  .wd-bug-report-field:focus{border-color:#5c7a4a;box-shadow:0 0 0 3px rgba(92,122,74,.14)}
  .wd-bug-report-textarea{min-height:132px;resize:vertical}
  .wd-bug-report-status{min-height:20px;margin-top:10px;color:#b04c32;font-size:13px}
  .wd-bug-report-status.success{color:#3d5c2e;font-weight:700}
  .wd-bug-report-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:10px}
  .wd-bug-report-actions button{padding:10px 15px;border-radius:10px;font:750 14px/1 inherit;cursor:pointer}
  .wd-bug-report-secondary{border:1px solid #d9c9aa;background:#fffdf8;color:#625747}
  .wd-bug-report-primary{border:1px solid #3d5c2e;background:#3d5c2e;color:#fff}
  .wd-bug-report-primary:disabled{opacity:.6;cursor:wait}
  @media(max-width:768px){.wd-bug-report-open{right:12px;bottom:82px;padding:10px}.wd-bug-report-open span{display:none}.wd-bug-report-dialog form{padding:20px}}
</style>

<script>
(function(){
  const dialog = document.getElementById('wd-bug-report-dialog');
  const openButton = document.getElementById('wd-bug-report-open');
  const closeButton = document.getElementById('wd-bug-report-close');
  const cancelButton = document.getElementById('wd-bug-report-cancel');
  const form = document.getElementById('wd-bug-report-form');
  if (!dialog || !openButton || !form) return;

  function closeDialog(){ if (dialog.open) dialog.close(); }
  openButton.addEventListener('click', function(){
    document.getElementById('wd-bug-report-status').textContent = '';
    dialog.showModal();
    setTimeout(function(){ document.getElementById('wd-bug-title').focus(); }, 0);
  });
  closeButton.addEventListener('click', closeDialog);
  cancelButton.addEventListener('click', closeDialog);
  dialog.addEventListener('click', function(event){
    if (event.target === dialog) closeDialog();
  });

  form.addEventListener('submit', async function(event){
    event.preventDefault();
    const title = document.getElementById('wd-bug-title');
    const description = document.getElementById('wd-bug-description');
    const submitButton = document.getElementById('wd-bug-report-submit');
    const status = document.getElementById('wd-bug-report-status');
    if (!title.checkValidity() || !description.checkValidity()) {
      status.textContent = '제목과 내용을 조금 더 자세히 적어주세요.';
      return;
    }
    submitButton.disabled = true;
    status.classList.remove('success');
    status.textContent = '보내는 중입니다…';
    try {
      const response = await fetch('/api/bug-reports', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          category: document.getElementById('wd-bug-category').value,
          title: title.value.trim(),
          description: description.value.trim(),
          source_page: {{ (request.endpoint or 'unknown')|tojson }}
        })
      });
      const payload = await response.json();
      if (!response.ok || payload.status !== 'success') throw new Error(payload.message || '제보를 보내지 못했습니다.');
      form.reset();
      status.classList.add('success');
      status.textContent = '제보가 접수되었습니다. 확인 후 개선하겠습니다.';
      setTimeout(closeDialog, 1400);
    } catch (error) {
      status.textContent = error.message;
    } finally {
      submitButton.disabled = false;
    }
  });
})();
</script>
{% endif %}
