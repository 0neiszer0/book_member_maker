{% extends 'auth_base.html' %}
{% block title %}로그인 · 책 먹는 호반우{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="auth-eyebrow">MEMBER</p>
  <h1 class="auth-title">카카오로<br>시작하기</h1>
  <p class="auth-lead">카카오 계정으로 로그인합니다. 아직 연결된 계정이 없다면 회원가입 화면으로 바로 이어집니다.</p>

  <div class="auth-actions">
    <a class="auth-btn auth-btn-kakao" href="{{ url_for('kakao_login', mode='login') }}">
      <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5c-5.25 0-9.5 3.4-9.5 7.6 0 2.7 1.77 5.08 4.43 6.43l-.9 3.31a.55.55 0 0 0 .82.61l3.9-2.58c.4.05.83.08 1.25.08 5.25 0 9.5-3.4 9.5-7.6S17.25 3.5 12 3.5Z" fill="currentColor"/></svg>
      카카오로 로그인
    </a>
  </div>

  <div class="auth-callout">
    <strong>처음 오셨나요?</strong>
    <p>카카오 인증 후 회원 정보를 확인하고 가입 신청을 진행합니다.</p>
    <a class="auth-btn auth-btn-primary" href="{{ url_for('kakao_login', mode='signup') }}">회원가입</a>
  </div>
</section>
<a class="auth-back" href="{{ url_for('main_index') }}">홈으로 돌아가기</a>
{% endblock %}
