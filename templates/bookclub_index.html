<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>독서모임 조 편성</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --eva-purple: #6A0DAD;
            --eva-green: #00FF7F;
            --bg-dark: #1A1A1A;
            --card-dark: #2D2D2D;
            --text-light: #E5E5E5;
            --border-dark: #444444;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
        }

        h1,
        h2,
        h3,
        summary {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .eva-card {
            background-color: var(--card-dark);
            border: 1px solid var(--border-dark);
        }

        .section {
            background-color: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .section summary {
            list-style: none;
            background-color: var(--eva-purple);
            color: #fff;
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .section[open] summary {
            border-bottom: 1px solid var(--border-dark);
        }

        .section div.content {
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
        }

        .form-check {
            display: flex;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 0.5rem;
            border-radius: 4px;
        }

        .form-check input {
            margin-right: 0.5rem;
            accent-color: var(--eva-green);
        }

        .controls {
            text-align: right;
            grid-column: 1 / -1;
            margin-bottom: 0.5rem;
        }

        .controls button {
            background-color: var(--eva-green);
            color: black;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-left: 0.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        .controls button.secondary {
            background-color: #4A4A4A;
            color: var(--text-light);
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
        }

        .settings label {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .settings input {
            margin-top: 0.3rem;
            padding: 0.4rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            color: var(--text-light);
        }

        .btn-submit {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--eva-green);
            color: black;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            box-shadow: 0 0 15px var(--eva-green);
        }

        dialog {
            background-color: var(--card-dark);
            color: var(--text-light);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
        }

        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.7);
        }

        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #loading-overlay .loader {
            border: 8px solid #444;
            border-top: 8px solid var(--eva-green);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="w-full">
    {% include '_header.html' %}

    <div class="container mx-auto max-w-2xl px-4 mt-8">
        <h1 class="text-3xl text-eva-green mb-6 text-center">Bookclub Grouping</h1>

        <form id="group-form">
            <details class="section" open>
                <summary>Attendee Select</summary>
                <div class="content">
                    <div class="controls">
                        <button type="button" id="select-all-present">전체</button>
                        <button type="button" class="secondary" id="deselect-all-present">해제</button>
                    </div>
                    {% for m in all_members %}
                    <label class="form-check">
                        <input type="checkbox" name="present" value="{{ m.name }}" {% if m.id in
                            pre_checked_attendee_ids %}checked{% endif %}>
                        {{ m.name }}
                    </label>
                    {% endfor %}
                </div>
            </details>

            <details class="section">
                <summary>Facilitator Select</summary>
                <div class="content">
                    <div class="controls">
                        <button type="button" id="select-all-facilitators">전체</button>
                        <button type="button" class="secondary" id="deselect-all-facilitators">해제</button>
                    </div>
                    {% for m in all_members %}
                    <label class="form-check">
                        <input type="checkbox" name="facilitators" value="{{ m.name }}">
                        {{ m.name }}
                    </label>
                    {% endfor %}
                </div>
            </details>

            <details class="section">
                <summary>⚙️ Advanced Settings</summary>
                <div class="settings">
                    <label>그룹 수 (선택)
                        <input type="number" name="group_count" min="1" max="30" placeholder="자동">
                    </label>
                    <label>그룹 이름 (쉼표로 구분)
                        <input type="text" name="group_names" placeholder="A팀,B팀,C팀">
                    </label>
                </div>
            </details>

            <button type="button" id="generate-btn" class="btn-submit mt-4">GENERATE GROUPS</button>
        </form>

        <div class="mt-6 text-center">
            <button type="button" id="manage-history-btn"
                class="text-sm text-gray-400 hover:text-eva-green font-bold">이전 모임 기록 관리</button>
        </div>
    </div>

    <dialog id="history-dialog" class="p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl text-eva-purple">이전 모임 기록</h3>
            <button type="button" id="history-close" class="text-2xl hover:text-red-500">&times;</button>
        </div>
        <div id="history-list" class="max-h-96 overflow-y-auto">
        </div>
    </dialog>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p class="text-xl mt-4 font-bold text-eva-green">GENERATING GROUPS...</p>

        <div class="mt-4 w-full max-w-md bg-gray-700 rounded-full h-4">
            <div id="progress-bar"
                class="bg-eva-green h-4 rounded-full text-center text-xs text-black font-bold leading-4"
                style="width: 0%;"></div>
        </div>
        <p id="progress-text" class="mt-2 text-lg">0%</p>

        <div class="flex justify-between w-full max-w-md mt-2 text-sm text-gray-400">
            <span id="time-elapsed">00:00</span>
            <span id="time-remaining">계산 중...</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 전체 선택/해제 버튼 ---
            document.getElementById('select-all-present').onclick = () => document.querySelectorAll('input[name="present"]').forEach(cb => cb.checked = true);
            document.getElementById('deselect-all-present').onclick = () => document.querySelectorAll('input[name="present"]').forEach(cb => cb.checked = false);
            document.getElementById('select-all-facilitators').onclick = () => document.querySelectorAll('input[name="facilitators"]').forEach(cb => cb.checked = true);
            document.getElementById('deselect-all-facilitators').onclick = () => document.querySelectorAll('input[name="facilitators"]').forEach(cb => cb.checked = false);

            // --- 이전 모임 기록(History) 다이얼로그 관련 로직 ---
            const btnOpen = document.getElementById('manage-history-btn');
            const dialog = document.getElementById('history-dialog');
            const btnClose = document.getElementById('history-close');
            const listDiv = document.getElementById('history-list');

            btnOpen.addEventListener('click', () => {
                listDiv.innerHTML = '<p>로딩 중...</p>';
                dialog.showModal();
                fetch('/api/bookclub/history')
                    .then(res => res.ok ? res.json() : Promise.reject(res.statusText))
                    .then(data => {
                        if (!data.length) {
                            listDiv.innerHTML = '<p class="text-gray-500">저장된 기록이 없습니다.</p>';
                            return;
                        }

                        // 날짜별로 그룹화
                        const byDate = {};
                        data.forEach(rec => {
                            if (!byDate[rec.date]) byDate[rec.date] = [];
                            byDate[rec.date].push(rec);
                        });

                        let html = '<div class="space-y-4">';
                        Object.entries(byDate).sort(([a], [b]) => b.localeCompare(a)).forEach(([date, recs]) => {
                            html += `<div class="border border-gray-600 rounded-lg overflow-hidden">
                        <div class="bg-gray-700 px-4 py-2 font-bold text-eva-green flex justify-between items-center">
                            <span>📅 ${date}</span>
                            <span class="text-xs text-gray-300">${recs.length}개 기록</span>
                        </div>`;

                            recs.forEach(rec => {
                                const groups = rec.groups || [];
                                const totalMembers = groups.reduce((s, g) => s + g.length, 0);
                                html += `<div class="px-4 py-2 border-t border-gray-700">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-xs text-gray-400">${groups.length}개 조 / 전체 ${totalMembers}명</span>
                                    <div class="mt-1 space-y-1">`;

                                groups.forEach((g, gi) => {
                                    html += `<div class="text-xs text-gray-300">
                                        <span class="font-semibold text-gray-100">${gi + 1}조:</span> ${g.join(', ')}
                                    </div>`;
                                });

                                html += `</div>
                                </div>
                                <button data-id="${rec.id}" class="del-btn ml-4 flex-shrink-0 text-red-500 hover:text-red-400 text-xs font-bold px-2 py-1 border border-red-700 rounded">삭제</button>
                            </div>
                        </div>`;
                            });

                            html += '</div>';
                        });
                        html += '</div>';
                        listDiv.innerHTML = html;

                        listDiv.querySelectorAll('.del-btn').forEach(b => {
                            b.onclick = () => {
                                if (!confirm('이 기록을 삭제하면 만남 횟수도 자동으로 보정됩니다. 계속하시겠습니까?')) return;
                                fetch('/api/bookclub/history/delete', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ id: b.dataset.id })
                                }).then(r => r.ok ? btnOpen.click() : r.json().then(j => alert('삭제 실패: ' + j.message)));
                            };
                        });
                    }).catch(e => { listDiv.textContent = '기록을 불러오는데 실패했습니다.'; console.error(e); });
            });
            btnClose.addEventListener('click', () => dialog.close());

            // --- SSE 및 타이머 로직 ---
            const generateBtn = document.getElementById('generate-btn');
            const form = document.getElementById('group-form');
            const loadingOverlay = document.getElementById('loading-overlay');

            // [수정] 아래 4줄의 변수 선언이 누락되어 있었습니다.
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const timeElapsedEl = document.getElementById('time-elapsed');
            const timeRemainingEl = document.getElementById('time-remaining');

            let timerInterval;

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) {
                    return '계산 중...';
                }
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            }

            generateBtn.addEventListener('click', () => {
                const formData = new FormData(form);
                const presentCount = formData.getAll('present').length;

                if (presentCount === 0) {
                    alert('최소 1명 이상의 참석자를 선택해야 합니다.');
                    return;
                }

                const params = new URLSearchParams(formData).toString();

                // 타이머 초기화
                const startTime = Date.now();
                // 추정 소요 시간: 인원 수에 따라 다름 (60명 = 12초, 20명 = 5초)
                const estTotal = Math.max(5, Math.min(20, 1 + presentCount * 0.2));

                timeElapsedEl.textContent = '00:00';
                timeRemainingEl.textContent = formatTime(estTotal);

                progressBar.style.transition = 'none';
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
                loadingOverlay.style.display = 'flex';

                // RAF 기반 스무스 애니메이션 (SSE에 의존하지 않음)
                let animDone = false;
                function animateProgress() {
                    if (animDone) return;
                    const elapsed = (Date.now() - startTime) / 1000;
                    // easeOut 커브: 85%에 점셍 접근하두고 마지막 5%는 쿠파에 끝에 도달
                    const t = Math.min(1, elapsed / estTotal);
                    const eased = 1 - Math.pow(1 - t, 2.5); // easeOut
                    const displayPct = Math.floor(eased * 85);

                    progressBar.style.width = displayPct + '%';
                    progressText.textContent = displayPct + '%';

                    const remaining = Math.max(0, estTotal - elapsed);
                    timeElapsedEl.textContent = formatTime(elapsed);
                    timeRemainingEl.textContent = formatTime(remaining);

                    if (!animDone) requestAnimationFrame(animateProgress);
                }
                requestAnimationFrame(animateProgress);

                const eventSource = new EventSource(`/start_group_generation?${params}`);

                const stopAll = () => {
                    animDone = true;
                    clearInterval(timerInterval);
                    eventSource.close();
                };

                eventSource.addEventListener('complete', (event) => {
                    stopAll();
                    progressBar.style.transition = 'width 0.4s ease';
                    progressBar.style.width = '100%';
                    progressText.textContent = '100%';
                    timeRemainingEl.textContent = '00:00';
                    const data = JSON.parse(event.data);
                    setTimeout(() => {
                        document.open();
                        document.write(data.html);
                        document.close();
                    }, 400);
                });

                eventSource.addEventListener('error', (event) => {
                    stopAll();
                    let message = '알 수 없는 오류가 발생했습니다.';
                    if (event.data) {
                        try { message = JSON.parse(event.data).error; } catch (e) { console.error(e); }
                    }
                    alert('조 편성 중 오류 발생: ' + message);
                    loadingOverlay.style.display = 'none';
                });
            });
        });
    </script>

</body>

</html>
