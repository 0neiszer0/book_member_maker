<!-- Lucide 아이콘 로더: 이모지 대신 쓰는 SVG 아이콘 (<i data-lucide="..."></i>) -->
<script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js"></script>
<script>
    (function () {
        function render() { if (window.lucide) lucide.createIcons(); }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
        else render();
    })();
</script>
