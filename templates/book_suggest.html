{% extends 'engagement_base.html' %}
{% block content %}
<section class="eg-hero"><div class="eg-kicker">책 추천</div><h1>함께 읽을 책 추천</h1><p class="eg-lead">함께 읽고 싶은 책을 추천해주세요.</p></section>
<form class="eg-panel eg-form" method="post" enctype="multipart/form-data">
  {% if member %}
  <div class="eg-identity"><strong>{{ member.name }}님으로 작성합니다.</strong><span class="eg-help">{{ member.department or '학과 미입력' }} · {{ member.student_id }}</span></div>
  {% else %}
  <div class="eg-grid"><label>학번<input class="eg-input" name="student_id" inputmode="numeric" required></label><label>이름<input class="eg-input" name="member_name" required></label></div>
  {% endif %}
  <label>도서명<input class="eg-input" name="title" maxlength="200" required></label>
  <label>저자<input class="eg-input" name="author" maxlength="120" required></label>
  <label>교보문고 링크<input class="eg-input" name="kyobo_url" type="url" placeholder="https://product.kyobobook.co.kr/..." required></label>
  <div><strong>어디에서 읽고 싶나요?</strong><div class="eg-checkboxes" style="margin-top:9px"><label class="eg-check"><input type="checkbox" name="targets" value="curriculum">세미나 커리큘럼</label><label class="eg-check"><input type="checkbox" name="targets" value="brick_book">벽돌책</label></div></div>
  <label>추천 이유<textarea class="eg-textarea" name="note" maxlength="3000" required placeholder="왜 함께 읽고 싶은지 알려주세요."></textarea></label>
  <label>표지 사진 <span class="eg-help">선택</span><input class="eg-input" type="file" name="cover" accept="image/jpeg,image/png,image/webp"><span class="eg-help">JPG, PNG, WEBP · 최대 5MB</span></label>
  <div class="eg-actions"><button class="eg-btn eg-btn-primary" type="submit">추천 등록</button><a class="eg-btn eg-btn-paper" href="{{ url_for('book_suggestions') }}">추천 목록</a></div>
</form>
{% endblock %}
