name: Keep Render & Supabase Alive

on:
  schedule:
    # 10분마다 실행 (Render 무료 플랜이 15분 무활동 시 슬립하므로 그 이전에 핑)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service (which also pings Supabase)
        run: |
          URL="${{ secrets.RENDER_KEEP_ALIVE_URL }}"
          if [ -z "$URL" ]; then
            echo "❌ RENDER_KEEP_ALIVE_URL secret 이 설정되지 않았습니다."
            echo "    예시: https://your-app.onrender.com/keep-alive"
            exit 1
          fi
          echo "Pinging $URL ..."
          # 최대 60초 대기 (Render 콜드 스타트 대비), 실패 시 종료 코드 0이 아님
          HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" --max-time 60 "$URL")
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/response.json || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Keep-alive ping failed (status=$HTTP_CODE)"
            exit 1
          fi
          echo "✅ Keep-alive succeeded"
