name: Keep Render & Supabase Alive

on:
  schedule:
    # 12분마다 실행 (Render 무료 플랜은 15분 무활동 시 슬립). GitHub Actions cron 은
    # 종종 1~2분 지연/스킵되므로 10분이 아닌 12분 간격으로 잡아 동시 실행 충돌을 줄임.
    - cron: '*/12 * * * *'
  workflow_dispatch:

# 동시에 여러 번 돌지 않도록 (지난 실행이 길어질 때 큐 쌓임 방지)
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping Render service (cold-start tolerant, with retries)
        env:
          URL: ${{ secrets.RENDER_KEEP_ALIVE_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::RENDER_KEEP_ALIVE_URL secret 이 설정되지 않았습니다."
            echo "Repo Settings > Secrets and variables > Actions 에서 추가하세요."
            echo "예시 값: https://your-app.onrender.com/keep-alive"
            exit 1
          fi

          # Render 콜드 스타트는 최대 ~60s 가 걸릴 수 있음. retry 3회 (총 ~6분 한도 안)
          for attempt in 1 2 3; do
            echo "Attempt $attempt: pinging $URL"
            HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
              --max-time 90 \
              --retry 0 \
              -H "User-Agent: gh-actions-keepalive" \
              "$URL" || echo "000")
            echo "HTTP Status: $HTTP_CODE"
            cat /tmp/response.json 2>/dev/null || true
            echo ""
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Keep-alive succeeded (attempt $attempt)"
              exit 0
            fi
            # 5xx / 000 / timeout → 재시도. 4xx 는 재시도해도 의미 없음.
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" -ge 400 ] && [ "$HTTP_CODE" -lt 500 ]; then
              echo "::error::Client error ($HTTP_CODE) — 재시도하지 않음."
              exit 1
            fi
            echo "일시적 실패. 20초 후 재시도..."
            sleep 20
          done

          echo "::warning::3회 모두 실패 — 다음 cron 에서 다시 시도됩니다."
          # 무료 플랜에서 가끔 발생하는 일시적 콜드 스타트 실패를 hard fail 로 만들지 않음.
          # (계속 빨갛게 보이는 것을 막고, 다음 12분 후 재시도)
          exit 0
